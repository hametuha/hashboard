name: Hashboard Test

on:
  pull_request:
    branches:
      - master

jobs:
  test:
    strategy:
      matrix:
        php: [ '8.2' ] # PHP versions to check.
        wp: [ 'latest', '6.6' ]      # WordPress version to check.
    name: WordPress ${{ matrix.wp }} in PHP ${{ matrix.php }} UnitTest
    uses: tarosky/workflows/.github/workflows/wp-unit-test.yml@main
    with:
      php_version: ${{ matrix.php }}
      wp_version: ${{ matrix.wp }}

  assets:
    name: Assets Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@main

      - name: Install NPM
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Run NPM install
        run: npm install

      - name: Run Jest
        run: npm run test:js

      - name: Run Lint
        run: npm run lint:js

  lint:
    name: PHP Syntax Check
    uses: tarosky/workflows/.github/workflows/phpcs.yml@main
    with:
      version: 7.4

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@main

      - name: Install NPM
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Run NPM install
        run: npm install

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Start WordPress Environment
        run: npm start &

      - name: Wait for WordPress to be ready
        run: |
          timeout 600 bash -c 'until curl -f http://localhost:8888/wp-json/wp/v2/posts > /dev/null 2>&1; do sleep 5; done'

      - name: Run E2E Tests
        run: npm run test:e2e

      - name: Upload E2E Test Results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-test-results
          path: test-results/
          retention-days: 7

      - name: Stop WordPress Environment
        if: always()
        run: npm stop

  status-check:
    name: Status Check
    runs-on: ubuntu-latest
    needs: [ test, assets, lint ]
    if: always()
    steps:
      - uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
